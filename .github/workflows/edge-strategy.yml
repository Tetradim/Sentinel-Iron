name: Iron Edge Strategy

on:
  push:
    branches: [main]
    paths:
      - 'src/sentinel_iron/edge_strategy.py'
      - 'src/sentinel_iron/edge_worker.py'
      - 'tests/test_edge_strategy.py'
      - 'pyproject.toml'
      - '.github/workflows/edge-strategy.yml'
  workflow_dispatch:

permissions:
  contents: read
  statuses: write

jobs:
  edge-strategy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Mark strategy checks pending
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          target_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          curl --fail-with-body -sS -L -X POST -H "Accept: application/vnd.github+json" -H "Authorization: Bearer $GH_TOKEN" -H "X-GitHub-Api-Version: 2022-11-28" "https://api.github.com/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" -d "{\"state\":\"pending\",\"context\":\"Iron Edge Strategy\",\"description\":\"Iron authorization checks are running\",\"target_url\":\"${target_url}\"}"
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install package
        run: |
          python -m pip install --upgrade pip wheel
          pip install -e '.[dev]'
      - name: Compile Edge execution runtime
        run: python -m py_compile src/sentinel_iron/edge_strategy.py src/sentinel_iron/edge_worker.py
      - name: Run Edge execution regressions
        run: pytest -q tests/test_edge_strategy.py
      - name: Publish successful strategy status
        if: ${{ success() }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          target_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          curl --fail-with-body -sS -L -X POST -H "Accept: application/vnd.github+json" -H "Authorization: Bearer $GH_TOKEN" -H "X-GitHub-Api-Version: 2022-11-28" "https://api.github.com/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" -d "{\"state\":\"success\",\"context\":\"Iron Edge Strategy\",\"description\":\"Iron authorization checks passed\",\"target_url\":\"${target_url}\"}"
      - name: Publish failed strategy status
        if: ${{ failure() }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          target_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          curl --fail-with-body -sS -L -X POST -H "Accept: application/vnd.github+json" -H "Authorization: Bearer $GH_TOKEN" -H "X-GitHub-Api-Version: 2022-11-28" "https://api.github.com/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" -d "{\"state\":\"failure\",\"context\":\"Iron Edge Strategy\",\"description\":\"Iron authorization checks failed\",\"target_url\":\"${target_url}\"}"
